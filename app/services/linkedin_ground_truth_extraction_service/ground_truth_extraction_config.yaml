# Ground-truth topic labels (per-topic Yes/No + logprobs) for contextual stimulus JSON.
# Override path: GROUND_TRUTH_EXTRACTION_CONFIG
#
# Per post: one topic at a time (in order). Across posts: up to max_concurrent_posts in flight.
# Set max_concurrent_llm >= max_concurrent_posts so P parallel posts are not all blocked on the LLM semaphore.

default_model: gpt-4o-mini

# Max in-flight OpenAI API calls (shared across all posts' topic calls)
max_concurrent_llm: 6
# How many posts to classify in parallel (each only issues one LLM call at a time)
max_concurrent_posts: 6

llm:
  prob_threshold: 0.5
  max_text_chars: 6000
  per_call_timeout_sec: 90.0
  client_total_timeout_sec: 180.0
  include_post_body: true

# Async chunked job (S3 partial checkpoints; self-triggering process endpoint)
batch:
  posts_per_process_invocation: 2
  save_partial_after_each_chunk: true

# Retries per topic call (transient 429/5xx/timeout only)
tier1:
  max_attempts: 5
  base_delay_sec: 1.0
  max_delay_sec: 60.0
  jitter_sec: 0.35

tier2:
  max_attempts: 6
  base_delay_sec: 1.0
  max_delay_sec: 90.0
  jitter_sec: 0.4
