# AI Gateway Configuration
# Environment variables will override these values if set

gateway:
  # Enable/disable the AI Gateway (can be overridden by USE_AI_GATEWAY env var)
  enabled: true
  
  # Gateway provider: vercel, portkey, langfuse, or custom
  provider: vercel
  
  # Base URL for the gateway (optional for Vercel, uses defaults if not set)
  # Can be overridden by AI_GATEWAY_BASE_URL env var
  base_url: ""
  
  # API key for the gateway (should be set via AI_GATEWAY_API_KEY env var for security)
  api_key: ""
  
  # Vercel AI Gateway (vectorial-reddit-pipeline style)
  vercel:
    openai_url: "https://ai-gateway.vercel.sh/v1"
    anthropic_url: "https://ai-gateway.vercel.sh"

# Model fallback configuration
# Separate fallback lists for different use cases
model_rotation:
  # Profile Summary fallbacks (used by call_via_gateway with return_text=False)
  # Default: openai/gpt-5-mini, then fallbacks
  profile_summary:
    default: "openai/gpt-5-mini"
    fallbacks:
      - "anthropic/claude-sonnet-4.5"
      - "openai/gpt-4o-mini"
  
  # Group Summary fallbacks (used by call_via_gateway with return_text=True)
  # Default: anthropic/claude-sonnet-4.5, then fallbacks
  group_summary:
    default: "anthropic/claude-sonnet-4.5"
    fallbacks:
      - "openai/gpt-5-mini"
      - "openai/gpt-4o-mini"
  
  # Comment Context Summary fallbacks (used by comment_context_summary_service)
  # Default: groq/llama-3.3-70b-versatile (via AI Gateway), then fallbacks
  comment_context_summary:
    default: "groq/llama-3.3-70b-versatile"
    fallbacks:
      - "openai/gpt-5-mini"
      - "openai/gpt-4o-mini"

  # User Post Classifier (used by user_post_classifier_service)
  # Default: groq/llama-3.3-70b-versatile (via AI Gateway), then fallbacks
  user_post_classifier:
    default: "groq/llama-3.3-70b-versatile"
    fallbacks:
      - "openai/gpt-5-mini"
      - "openai/gpt-4o-mini"

  # LinkedIn category/topic theme discovery (app.services.linkedin_theme_discovery_service)
  linkedin_theme_discovery_tier1:
    default: "openai/gpt-4o-mini"
    fallbacks:
      - "openai/gpt-4.1-mini"
      - "openai/gpt-4o-mini"
  linkedin_theme_discovery_tier2:
    default: "openai/gpt-4o-mini"
    fallbacks:
      - "openai/gpt-4.1-mini"
      - "openai/gpt-4o-mini"

  # Contextual stimulus + category (tier 1) / category only for replies (tier 2)
  linkedin_stimulus_extraction_tier1:
    default: "openai/gpt-4o-mini"
    fallbacks:
      - "openai/gpt-4.1-mini"
      - "openai/gpt-4o-mini"
  linkedin_stimulus_extraction_tier2:
    default: "openai/gpt-4o-mini"
    fallbacks:
      - "openai/gpt-4.1-mini"
      - "openai/gpt-4o-mini"

  # Legacy: general fallbacks (for backward compatibility)
  models:
    - "openai/gpt-5-mini"
    - "anthropic/claude-sonnet-4.5"
    - "openai/gpt-4o-mini"
